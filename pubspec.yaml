name: weight_tracker
description: 体重管理追踪应用 - 记录体重、OCR识别、照片管理、视频生成
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.5

  # 本地数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2

  # 图表
  fl_chart: ^0.66.0

  # 照片选取与处理
  image_picker: ^1.0.7
  image: ^4.1.3

  # OCR 识别
  google_mlkit_text_recognition: ^0.13.0

  # 视频生成
  ffmpeg_kit_flutter: ^6.0.3

  # 路由
  go_router: ^13.2.0

  # 数据类
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 其他
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  drift_dev: ^2.18.0
  freezed: ^2.4.8
  json_serializable: ^6.7.1

  # 测试
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # 如果有自定义资源，取消下面注释
  # assets:
  #   - assets/fonts/
  #   - assets/images/
